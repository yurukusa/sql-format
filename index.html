<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Format — SQL Query Formatter & Beautifier</title>
<meta name="description" content="Format and beautify SQL queries. Uppercase keywords, custom indentation, minify. Supports SELECT, INSERT, UPDATE, DELETE, CREATE. Free.">
<meta property="og:title" content="SQL Format — SQL Query Formatter & Beautifier">
<meta property="og:description" content="Format SQL queries. Uppercase keywords, indent, minify. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/sql-format/">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.options{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.opt{display:flex;align-items:center;gap:6px}
.opt label{font-size:0.72rem;color:#555}
.opt select{padding:6px 10px;border-radius:6px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-family:'Fira Code',monospace;font-size:0.82rem;outline:none}
.opt input[type=checkbox]{accent-color:#3b82f6}

.editor{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.pane{display:flex;flex-direction:column}
.pane h3{font-size:0.72rem;color:#555;margin-bottom:6px}
.pane textarea{flex:1;min-height:350px;padding:14px;border-radius:10px;border:1px solid #222;background:#0d0d0d;color:#ddd;font-family:'Fira Code',monospace;font-size:0.82rem;resize:vertical;outline:none;line-height:1.6;tab-size:2}
.pane textarea:focus{border-color:#3b82f6}

.btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}

.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.preset-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer}
.preset-btn:hover{border-color:#3b82f6;color:#888}

.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:#161616;border:1px solid #222;border-radius:8px;padding:8px 14px;text-align:center}
.stat .num{font-family:'Fira Code',monospace;font-size:1rem;color:#4da6ff}
.stat .lbl{font-size:0.68rem;color:#555;margin-top:2px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){.editor{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>SQL Format</h1>
<p class="subtitle">Format and beautify SQL queries. No upload, no server.</p>

<div class="options">
  <div class="opt"><label>Indent</label><select id="indent"><option value="2">2 spaces</option><option value="4">4 spaces</option><option value="\t">Tab</option></select></div>
  <div class="opt"><label><input type="checkbox" id="uppercase" checked> Uppercase keywords</label></div>
  <div class="opt"><label><input type="checkbox" id="lineBreakComma"> Comma on new line</label></div>
</div>

<div class="presets">
  <button class="preset-btn" onclick="loadPreset('select')">SELECT</button>
  <button class="preset-btn" onclick="loadPreset('join')">JOIN</button>
  <button class="preset-btn" onclick="loadPreset('insert')">INSERT</button>
  <button class="preset-btn" onclick="loadPreset('update')">UPDATE</button>
  <button class="preset-btn" onclick="loadPreset('create')">CREATE TABLE</button>
  <button class="preset-btn" onclick="loadPreset('subquery')">Subquery</button>
</div>

<div class="editor">
  <div class="pane"><h3>Input SQL</h3><textarea id="input" placeholder="Paste SQL query here..."></textarea></div>
  <div class="pane"><h3>Formatted Output</h3><textarea id="output" readonly placeholder="Formatted SQL will appear here..."></textarea></div>
</div>

<div class="btn-row">
  <button class="btn primary" onclick="formatSQL()">Format</button>
  <button class="btn" onclick="minifySQL()">Minify</button>
  <button class="btn" onclick="copyOutput()">Copy</button>
  <button class="btn" onclick="clearAll()">Clear</button>
</div>

<div class="stats" id="stats"></div>
</div>

<footer>
  <a href="https://github.com/yurukusa/sql-format">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
const KEYWORDS=['SELECT','FROM','WHERE','AND','OR','NOT','IN','EXISTS','BETWEEN','LIKE',
  'ORDER BY','GROUP BY','HAVING','LIMIT','OFFSET','INSERT INTO','VALUES','UPDATE','SET',
  'DELETE FROM','CREATE TABLE','ALTER TABLE','DROP TABLE','JOIN','INNER JOIN','LEFT JOIN',
  'RIGHT JOIN','FULL JOIN','CROSS JOIN','ON','AS','DISTINCT','CASE','WHEN','THEN','ELSE','END',
  'UNION','UNION ALL','EXCEPT','INTERSECT','IS NULL','IS NOT NULL','ASC','DESC','COUNT','SUM',
  'AVG','MIN','MAX','IF','INTO','WITH','RECURSIVE','RETURNING','CASCADE','CONSTRAINT',
  'PRIMARY KEY','FOREIGN KEY','REFERENCES','UNIQUE','INDEX','DEFAULT','NOT NULL','CHECK',
  'ADD COLUMN','DROP COLUMN','RENAME TO','GRANT','REVOKE','BEGIN','COMMIT','ROLLBACK',
  'TRUNCATE','EXPLAIN','ANALYZE'];

// Sort by length descending so longer keywords match first
const KW_SORTED=[...KEYWORDS].sort((a,b)=>b.length-a.length);

// Major clause keywords that get their own line (no indent)
const MAJOR=['SELECT','FROM','WHERE','ORDER BY','GROUP BY','HAVING','LIMIT','OFFSET',
  'INSERT INTO','VALUES','UPDATE','SET','DELETE FROM','CREATE TABLE','ALTER TABLE',
  'DROP TABLE','UNION','UNION ALL','EXCEPT','INTERSECT','WITH','RETURNING'];

// Sub-clause keywords that get their own line (with indent)
const SUB=['AND','OR','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN','CROSS JOIN','JOIN','ON',
  'CASE','WHEN','THEN','ELSE','END'];

function formatSQL(){
  const raw=document.getElementById('input').value.trim();
  if(!raw){return}
  const uc=document.getElementById('uppercase').checked;
  const commaNewLine=document.getElementById('lineBreakComma').checked;
  const indentVal=document.getElementById('indent').value;
  const tab=indentVal==='\t'?'\t':' '.repeat(+indentVal);

  // Tokenize: preserve strings, identifiers, comments
  const tokens=tokenize(raw);

  // Build formatted output
  let result='';
  let depth=0;
  let newLine=true;
  let prevToken='';

  for(let i=0;i<tokens.length;i++){
    const t=tokens[i];

    if(t.type==='string'||t.type==='comment'){
      if(newLine){result+=tab.repeat(depth);newLine=false}
      else if(prevToken&&!prevToken.endsWith('('))result+=' ';
      result+=t.value;
      prevToken=t.value;
      continue;
    }

    const upper=t.value.toUpperCase();

    // Check if this + next form a multi-word keyword
    let kwMatch='';
    const remaining=tokens.slice(i).filter(x=>x.type==='word').map(x=>x.value.toUpperCase());
    for(const kw of KW_SORTED){
      const parts=kw.split(' ');
      if(parts.every((p,j)=>remaining[j]===p)){
        kwMatch=kw;
        break;
      }
    }

    if(kwMatch&&MAJOR.includes(kwMatch)){
      const parts=kwMatch.split(' ');
      if(result&&!result.endsWith('\n'))result+='\n';
      const formatted=uc?kwMatch:kwMatch.toLowerCase();
      result+=formatted;
      newLine=false;
      // Skip consumed tokens
      let skip=parts.length-1;
      for(let j=i+1;j<tokens.length&&skip>0;j++){
        if(tokens[j].type==='word'){skip--;tokens[j]._skip=true}
      }
      prevToken=kwMatch;
      continue;
    }

    if(t._skip){continue}

    if(kwMatch&&SUB.includes(kwMatch)){
      const parts=kwMatch.split(' ');
      if(!result.endsWith('\n'))result+='\n';
      const d=kwMatch==='END'?Math.max(0,depth-1):depth;
      result+=tab.repeat(d);
      const formatted=uc?kwMatch:kwMatch.toLowerCase();
      result+=formatted;
      newLine=false;
      let skip=parts.length-1;
      for(let j=i+1;j<tokens.length&&skip>0;j++){
        if(tokens[j].type==='word'){skip--;tokens[j]._skip=true}
      }
      if(kwMatch==='CASE')depth++;
      if(kwMatch==='END')depth=Math.max(0,depth-1);
      prevToken=kwMatch;
      continue;
    }

    if(t.value==='('){
      if(newLine){result+=tab.repeat(depth);newLine=false}
      else result+=' ';
      result+='(';
      depth++;
      prevToken='(';
      continue;
    }
    if(t.value===')'){
      depth=Math.max(0,depth-1);
      if(!result.endsWith('\n'))result+='\n';
      result+=tab.repeat(depth)+')';
      newLine=false;
      prevToken=')';
      continue;
    }
    if(t.value===','){
      result+=',';
      if(commaNewLine){result+='\n'+tab.repeat(depth);newLine=false}
      prevToken=',';
      continue;
    }
    if(t.value===';'){
      result+=';\n';
      newLine=true;
      depth=0;
      prevToken=';';
      continue;
    }

    // Regular word/operator
    if(newLine){result+=tab.repeat(depth);newLine=false}
    else if(prevToken&&!prevToken.endsWith('(')&&t.value!==')')result+=' ';

    let val=t.value;
    if(t.type==='word'&&KW_SORTED.some(k=>k===upper)){
      val=uc?upper:upper.toLowerCase();
    }

    // After major keyword, indent subsequent tokens
    if(MAJOR.includes(prevToken)){
      result+='\n'+tab.repeat(depth+1)+val;
    }else{
      result+=val;
    }
    prevToken=t.value.toUpperCase();
  }

  document.getElementById('output').value=result.trim();
  showStats(raw,result.trim());
}

function tokenize(sql){
  const tokens=[];
  let i=0;
  while(i<sql.length){
    // Whitespace
    if(/\s/.test(sql[i])){i++;continue}
    // Single-line comment
    if(sql[i]==='-'&&sql[i+1]==='-'){
      let end=sql.indexOf('\n',i);
      if(end===-1)end=sql.length;
      tokens.push({type:'comment',value:sql.slice(i,end)});
      i=end;continue;
    }
    // Block comment
    if(sql[i]==='/'&&sql[i+1]==='*'){
      let end=sql.indexOf('*/',i+2);
      if(end===-1)end=sql.length;else end+=2;
      tokens.push({type:'comment',value:sql.slice(i,end)});
      i=end;continue;
    }
    // String
    if(sql[i]==="'"||sql[i]==='"'){
      const q=sql[i];let j=i+1;
      while(j<sql.length){
        if(sql[j]===q){if(sql[j+1]===q){j+=2}else{j++;break}}
        else if(sql[j]==='\\'&&j+1<sql.length){j+=2}
        else j++;
      }
      tokens.push({type:'string',value:sql.slice(i,j)});
      i=j;continue;
    }
    // Backtick identifier
    if(sql[i]==='`'){
      let j=sql.indexOf('`',i+1);
      if(j===-1)j=sql.length;else j++;
      tokens.push({type:'string',value:sql.slice(i,j)});
      i=j;continue;
    }
    // Punctuation
    if('(),;'.includes(sql[i])){
      tokens.push({type:'punct',value:sql[i]});
      i++;continue;
    }
    // Operators
    if('<>=!'.includes(sql[i])){
      let op=sql[i];
      if(i+1<sql.length&&'<>='.includes(sql[i+1])){op+=sql[i+1];i++}
      tokens.push({type:'op',value:op});
      i++;continue;
    }
    // Numbers
    if(/[0-9]/.test(sql[i])){
      let j=i;
      while(j<sql.length&&/[0-9.]/.test(sql[j]))j++;
      tokens.push({type:'number',value:sql.slice(i,j)});
      i=j;continue;
    }
    // Words (identifiers, keywords)
    if(/[a-zA-Z_*]/.test(sql[i])){
      let j=i;
      while(j<sql.length&&/[a-zA-Z0-9_.*]/.test(sql[j]))j++;
      tokens.push({type:'word',value:sql.slice(i,j)});
      i=j;continue;
    }
    // Other
    tokens.push({type:'other',value:sql[i]});
    i++;
  }
  return tokens;
}

function minifySQL(){
  const raw=document.getElementById('input').value.trim();
  if(!raw)return;
  const tokens=tokenize(raw);
  let result='';
  let prev='';
  tokens.forEach(t=>{
    if(t.type==='comment')return;
    const needSpace=prev&&t.value!==','&&t.value!==')'&&t.value!==';'&&prev!=='('&&
      !(['op','punct'].includes(t.type)&&['op','punct'].includes(prev));
    if(needSpace&&prev)result+=' ';
    result+=t.value;
    prev=t.type;
  });
  document.getElementById('output').value=result.trim();
  showStats(raw,result.trim());
}

function showStats(input,output){
  const inLines=input.split('\n').length;
  const outLines=output.split('\n').length;
  const inSize=new Blob([input]).size;
  const outSize=new Blob([output]).size;
  document.getElementById('stats').innerHTML=[
    {num:inLines,lbl:'Input Lines'},{num:outLines,lbl:'Output Lines'},
    {num:formatBytes(inSize),lbl:'Input Size'},{num:formatBytes(outSize),lbl:'Output Size'},
  ].map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function formatBytes(b){
  if(b<1024)return b+' B';
  return(b/1024).toFixed(1)+' KB';
}

function copyOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  navigator.clipboard.writeText(v);
  const el=document.createElement('div');
  el.className='copied';el.textContent='Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

function clearAll(){
  document.getElementById('input').value='';
  document.getElementById('output').value='';
  document.getElementById('stats').innerHTML='';
}

const PRESETS={
  select:"select u.id, u.name, u.email, count(o.id) as order_count, sum(o.total) as total_spent from users u left join orders o on u.id = o.user_id where u.active = 1 and u.created_at > '2024-01-01' group by u.id, u.name, u.email having count(o.id) > 5 order by total_spent desc limit 20;",
  join:"select p.name, c.category_name, s.supplier_name, p.price, p.stock from products p inner join categories c on p.category_id = c.id left join suppliers s on p.supplier_id = s.id where p.price between 10 and 100 and c.active = 1 order by c.category_name, p.name;",
  insert:"insert into users (name, email, role, department, created_at) values ('Alice', 'alice@example.com', 'admin', 'Engineering', now()), ('Bob', 'bob@example.com', 'user', 'Marketing', now()), ('Charlie', 'charlie@example.com', 'user', 'Sales', now());",
  update:"update products set price = price * 1.1, updated_at = now() where category_id in (select id from categories where name = 'Electronics') and stock > 0 and active = 1;",
  create:"create table orders (id serial primary key, user_id integer not null references users(id), product_id integer not null references products(id), quantity integer default 1, total decimal(10,2) not null, status varchar(20) default 'pending', created_at timestamp default current_timestamp, constraint chk_quantity check (quantity > 0));",
  subquery:"select name, email from users where id in (select user_id from orders where total > (select avg(total) from orders) and created_at > '2024-06-01') and active = 1 order by name;"
};

function loadPreset(key){
  document.getElementById('input').value=PRESETS[key];
  formatSQL();
}
</script>
</body>
</html>
